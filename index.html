<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>近代洋匠录 · 数字人介绍</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Serif SC","Source Han Serif SC",STSong,serif;background:#f5f0e8;color:#2c2418;min-height:100vh;display:flex;justify-content:center;align-items:center;background-image:radial-gradient(ellipse at 20% 50%,rgba(196,163,90,0.06) 0%,transparent 60%)}
.card{width:100%;max-width:600px;background:#faf7f0;border-radius:24px;padding:40px 32px;text-align:center;box-shadow:0 20px 60px rgba(74,55,40,0.1);border:1px solid rgba(196,163,90,0.15);margin:20px}
.pic{width:160px;height:200px;border-radius:16px;overflow:hidden;margin:0 auto 20px;box-shadow:0 8px 32px rgba(0,0,0,0.2);border:2px solid rgba(196,163,90,0.2)}
.pic img{width:100%;height:100%;object-fit:cover}
h1{font-size:28px;color:#4a3728;letter-spacing:2px;margin-bottom:4px}
.sub{font-size:14px;color:#8b6914;margin-bottom:6px}
.line{width:50px;height:2px;background:#c4a35a;margin:14px auto;opacity:0.4}
.desc{font-size:14px;color:#7a6a58;line-height:1.8;margin-bottom:24px}
#playBtn{padding:16px 48px;border:none;border-radius:12px;background:#4a3728;color:#e8ddd0;font-size:18px;font-family:inherit;cursor:pointer;transition:all 0.3s;letter-spacing:2px;font-weight:600}
#playBtn:hover{background:#5c4534;transform:translateY(-2px);box-shadow:0 6px 20px rgba(74,55,40,0.2)}
#playBtn:active{transform:translateY(0)}
#playBtn.playing{background:#8b6914}
#status{margin-top:16px;font-size:14px;color:#7a6a58;min-height:24px;line-height:1.8}
#status.error{color:#b05040;background:#fdf0ed;padding:8px 16px;border-radius:8px}
#status.ok{color:#2a8a5e}
.prog{width:100%;height:4px;background:rgba(74,55,40,0.08);border-radius:2px;overflow:hidden;margin-top:16px}
.prog-fill{height:100%;background:linear-gradient(90deg,#c4a35a,#d4a853);width:0%;transition:width 0.1s}
.ch{margin-top:14px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.ch span{padding:5px 12px;border-radius:16px;font-size:12px;background:rgba(74,55,40,0.04);color:#7a6a58;border:1px solid rgba(74,55,40,0.06);transition:all 0.2s}
.ch span.active{background:rgba(196,163,90,0.12);color:#8b6914;border-color:#c4a35a;font-weight:600}
.ch span.done{opacity:0.35}
.voice-list{margin-top:20px;font-size:12px;color:#7a6a58;text-align:left;padding:12px;background:rgba(74,55,40,0.02);border-radius:8px;line-height:1.6;display:none}
.voice-list b{color:#4a3728}
</style>
</head>

  <h1>近代洋匠录</h1>
  <div class="sub">郑红彬 · 汕头大学长江艺术与设计学院</div>
  <div class="line"></div>
  <div class="desc" id="chapterDesc">开场白：各位师友大家好...</div>
  <div class="ch" id="chList">
    <span class="active">1.开场白</span><span>2.书籍介绍</span><span>3.学术历程</span><span>4.致谢</span><span>5.结语</span>
  </div>
  <div class="prog"><div class="prog-fill" id="progFill"></div></div>
  <button id="playBtn">▶ 点击播放</button>
  <div id="status">点击按钮开始朗读</div>
  <div class="voice-list" id="voiceList"></div>
</div>
<script>
// Chapter data (shortened for reliability)
var CHAPTERS = [
  {t:"开场白",c:"各位师友大家好。我是来自汕头大学长江艺术与设计学院的郑红彬。今天想向大家介绍我编写的一本学术工具书——《近代洋匠录——近代在华外国建筑师、建筑事务所、建筑工程组织机构名录》。这本书在2024年12月由中国建筑工业出版社出版，目前已经面市。"},
  {t:"书籍介绍",c:"本名录是一部有关近代在华外籍建筑师生平概况的工具书，全书收录外籍建筑师2963人。本工具书主要有三个特点：第一，奠定基础。中国近代建筑史是中国开放进程和历史见证，外籍建筑师是重要研究线索，本名录奠定了坚实基础。第二，方便检索。提供了清晰的组织结构和索引系统。第三，资料完备。全书以200余万字勾勒出近代在华外籍建筑师群体概貌。"},
  {t:"学术历程",c:"我是2007年考入武汉大学城市设计学院跟随王炎松老师攻读硕士。2008年读到赖德霖老师的《近代哲匠录》埋下了编写此书的种子。2010年考入清华大学建筑学院跟随张复合先生攻读博士。后到剑桥大学联合培养，博士论文选题为《近代在华英国建筑师研究》。2014年答辩时单霁翔先生建议我继续拓展。最终在2024年完成此书。"},
  {t:"致谢",c:"对近代在华外籍建筑师的基础调研是复杂艰巨的工作。尤其要感谢赖德霖老师《近代哲匠录》的启发；导师张复合老师为本书作序；以及中国建筑工业出版社的李鸽、陈海娇等编辑老师。"},
  {t:"结语",c:"衷心希望本书出版能为中国近代建筑史研究起到添砖加瓦和抛砖引玉之效。希望学界同仁按图索骥进一步调查研究。大家可通过书中所留QQ邮箱与我联络。谢谢大家。"}
];
var cur=0,pl=0,utt=null,tmr=null,st=0;
var B=document.getElementById("playBtn"),S=document.getElementById("status"),P=document.getElementById("progFill");
var CL=document.getElementById("chList"),D=document.getElementById("chapterDesc"),VL=document.getElementById("voiceList");

// Show available voices
function showV(){var v=speechSynthesis.getVoices();var h="<b>检测到 "+v.length+" 个语音</b><br>";v.forEach(function(vo){h+=vo.name+" ["+vo.lang+"]"+(vo.localService?" 📍":" ☁️")+"<br>"});VL.innerHTML=h;VL.style.display="block"}
speechSynthesis.onvoiceschanged=showV;setTimeout(showV,2000);speechSynthesis.getVoices();

function updUI(i){
  cur=i;var items=CL.querySelectorAll("span");items.forEach(function(e,j){e.className="";if(j===i)e.className="active";else if(j<i)e.className="done"});
  D.textContent=CHAPTERS[i].t+"："+CHAPTERS[i].c.substring(0,30)+"...";
}

function speak(i){
  if(utt){speechSynthesis.cancel();if(tmr)clearInterval(tmr)}
  pl=0;updUI(i);var ch=CHAPTERS[i];
  utt=new SpeechSynthesisUtterance(ch.c);utt.lang="zh-CN";utt.rate=0.9;
  var voices=speechSynthesis.getVoices();
  var kang=voices.find(function(v){return /kangkang/i.test(v.name)});
  if(kang)utt.voice=kang;
  var dur=Math.max(ch.c.length*0.13,10);
  utt.onstart=function(){pl=1;st=Date.now();B.textContent="⏸ 暂停";B.className="playing";S.textContent="朗读中...["+(kang?kang.name:"默认语音")+"]";S.className=""};
  utt.onend=function(){pl=0;B.textContent="▶ 重播";B.className="";S.textContent="✅ 完成";S.className="ok";P.style.width="100%";if(i<CHAPTERS.length-1){setTimeout(function(){cur=i+1;speak(cur)},2500)}else{S.textContent="🎉 全部完成";}};
  utt.onerror=function(e){pl=0;B.textContent="▶ 重播";B.className="";S.textContent="❌ 语音出错: "+(e.error||"未知错误")+" - 浏览器可能不支持该语音";S.className="error"};
  tmr=setInterval(function(){if(!pl){clearInterval(tmr);return}P.style.width=Math.min(100,(Date.now()-st)/(dur*1000)*100)+"%"},100);
  speechSynthesis.speak(utt);
}

B.onclick=function(){
  if(utt&&speechSynthesis.speaking&&!speechSynthesis.paused){speechSynthesis.pause();B.textContent="▶ 继续";B.className="";S.textContent="已暂停";return}
  if(speechSynthesis.paused){speechSynthesis.resume();B.textContent="⏸ 暂停";B.className="playing";return}
  speak(cur);
};
</script>
